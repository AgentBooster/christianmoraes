<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="cr2X3cB9l30knGAJW1-yjYAeuveQW_HSKDjDUagazDk" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Christian Moraes</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png?v=2">
    <link rel="apple-touch-icon" href="../assets/favicon.png?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-bg: rgba(255, 255, 255, 0.02);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: white;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        .background-container {
            position: fixed; inset: 0; z-index: -1; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .neon-ring {
            position: absolute; width: 92vw; max-width: 900px; aspect-ratio: 1/1; border-radius: 50%;
            border: 48px solid rgba(255, 255, 255, 0.5); box-shadow: 0 0 100px rgba(255, 255, 255, 0.3), inset 0 0 80px rgba(255, 255, 255, 0.2);
            filter: blur(55px); opacity: 0.85; pointer-events: none; animation: pulse-ring 7s ease-in-out infinite;
        }
        @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 0.9; } }

        .stage-light { position: absolute; bottom: -250px; width: 100%; height: 500px; background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.12) 0%, transparent 70%); filter: blur(120px); pointer-events: none; }

        .liquid-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(55px) saturate(240%); -webkit-backdrop-filter: blur(55px) saturate(240%);
            border: 1px solid rgba(255, 255, 255, 0.18); position: relative; box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6), inset 0 0 14px rgba(255, 255, 255, 0.08);
        }

        .glass-edge::after {
            content: ""; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0) 60%, rgba(255, 255, 255, 0.25) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; pointer-events: none;
        }

        /* GLOBAL NAVIGATION */
        .nav-link {
            padding: 8px 12px;
            border-radius: 999px;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        @media (min-width: 480px) {
            .nav-link {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        @media (min-width: 768px) {
            .nav-link {
                padding: 12px 28px;
                font-size: 15px;
            }
        }.nav-link:hover { color: white; background: rgba(255, 255, 255, 0.06); }
        .nav-link.active { color: white; background: rgba(255, 255, 255, 0.15); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input:focus { box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1), 0 0 20px rgba(255, 255, 255, 0.1); }
        .active-filter { background: rgba(255, 255, 255, 0.15) !important; color: white !important; }
        .tag-pill { transition: all 0.3s ease; }
        .tag-pill.active { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.5); color: white; }
    </style>
</head>
<body class="flex flex-col items-center">
    
    <div class="background-container"><div class="neon-ring"></div><div class="stage-light"></div></div>

    <div class="relative z-10 w-full flex flex-col items-center px-4 py-8 md:py-12 min-h-screen">
        
        <!-- Global Navigation Bar -->
        <nav class="liquid-glass glass-edge px-1.5 py-1.5 md:px-3 md:py-2.5 rounded-full mb-12 md:mb-28 flex space-x-0.5 md:space-x-1.5 items-center justify-center max-w-[95vw]">
            <a href="../index.html" class="nav-link">Home</a>
            <a href="projects.html" class="nav-link active">Projects</a>
            <a href="education.html" class="nav-link">Education</a>
            <a href="about.html" class="nav-link">About</a>
        </nav>

        <main class="w-full max-w-6xl flex flex-col flex-grow pb-20">
            
            <div class="mb-4">
                <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-2">Projects</h1>
                <p class="text-white/50 text-lg">A selection of my best algorithms, applications, and experiments.</p>
            </div>

            <!-- FILTERS -->
            <div class="flex flex-col xl:flex-row items-center gap-4 mb-6 w-full mt-6">
                <div class="relative w-full xl:w-auto flex-grow flex-shrink">
                    <input type="text" id="searchInput" placeholder="Search projects..." class="liquid-glass glass-edge w-full rounded-full py-3 px-6 text-white bg-transparent outline-none placeholder-white/40 border border-white/10 transition-all focus:border-white/30">
                    <svg class="absolute right-5 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                
                <div class="flex gap-3 w-full xl:w-auto overflow-x-auto no-scrollbar pb-2 xl:pb-0">
                    <button id="btn-featured" class="filter-btn liquid-glass glass-edge px-6 py-3 rounded-full text-sm font-semibold text-white/60 hover:bg-white/10 hover:text-white transition-all whitespace-nowrap">Featured</button>
                    <button id="btn-all" class="filter-btn liquid-glass glass-edge px-6 py-3 rounded-full text-sm font-semibold hover:bg-white/10 transition-all whitespace-nowrap active-filter">All</button>
                    <button id="btn-tags" class="liquid-glass glass-edge px-6 py-3 rounded-full text-sm font-semibold text-white/60 flex items-center gap-2 hover:bg-white/10 hover:text-white transition-all whitespace-nowrap">
                        Tags
                        <svg class="w-4 h-4 transition-transform" id="tags-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                </div>
            </div>

            <!-- TAGS PANEL -->
            <div id="tags-panel" class="hidden liquid-glass glass-edge rounded-3xl p-6 md:p-8 mb-8 w-full border border-white/10 transition-all duration-300">
                <div class="mb-5">
                    <h3 class="text-white/40 text-xs font-bold uppercase tracking-wider mb-3">Areas</h3>
                    <div class="flex flex-wrap gap-2" id="areas-container"></div>
                </div>
                <div>
                    <h3 class="text-white/40 text-xs font-bold uppercase tracking-wider mb-3">Technologies</h3>
                    <div class="flex flex-wrap gap-2" id="tech-container"></div>
                </div>
            </div>

            <!-- PROJECTS GRID -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-7 w-full" id="projects-grid">
                <!-- Rendered by Javascript -->
            </div>
            
            <!-- EMPTY STATE -->
            <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-center w-full">
                <svg class="w-16 h-16 text-white/10 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <p class="text-white/50 text-lg">No projects match the selected filters.</p>
            </div>
        </main>
    </div>

    <script>
        // --- DATA LAYER ---
        const projects = [
            { id: 7, title: 'Neural Time Series Forecaster', desc: 'Deep learning models utilizing GRU/LSTM architectures for advanced sequence forecasting.', areas: ['Machine Learning'], techs: ['Python', 'TensorFlow', 'TypeScript'], featured: true, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/Machine_Learning_Deep_Learning/neural_time_series_forecaster_gru', img: '../assets/projects/cover_gru.webp' },
            { id: 8, title: 'Vision Image Classifier CNN', desc: 'Computer vision framework employing Convolutional Neural Networks for precise categorization.', areas: ['Machine Learning'], techs: ['Python', 'TensorFlow'], featured: true, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/Machine_Learning_Deep_Learning/vision_image_classifier_cnn', img: '../assets/projects/cover_cnn.webp' },
            { id: 5, title: 'KineticGuard', desc: 'iOS application utilizing SRPE and ACWR calculations to supervise training workloads and system states.', areas: ['CS Projects'], techs: ['Swift'], featured: true, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/CS_Projects_Py_CPP_Swift_SQL/swift/KineticGuard', img: '../assets/projects/cover_kineticguard.webp' },
            { id: 1, title: 'C-PhysEngine', desc: '2D Physics engine simulation utilizing core C structures and optimization capabilities.', areas: ['CS Projects'], techs: ['C-Family'], featured: true, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/CS_Projects_Py_CPP_Swift_SQL/c-family/c-physengine', img: '../assets/projects/cover_physengine2d.webp' },
            { id: 11, title: 'Widget Web Agent', desc: 'Embeddable multi-agent frontend widget showcasing external dynamic reactivity.', areas: ['Agents/Automation'], techs: ['React/Vite', 'TypeScript'], featured: false, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/Widget_Web_Agent', img: '../assets/projects/cover_widget_web_agent.webp' },
            { id: 14, title: 'AgentBooster Web', desc: 'Advanced multi-route commercial web application serving as the primary hub.', areas: ['Web Application'], techs: ['React/Vite', 'TypeScript'], featured: true, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/Software_Frontend/agentbooster', img: '../assets/projects/cover_agentbooster.webp' },
            { id: 13, title: 'Risolvia', desc: 'Advanced functional web application developed for the legal sector, providing end-to-end data processing.', areas: ['Web Application'], techs: ['React/Vite', 'TypeScript'], featured: false, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/Software_Frontend/risolvia', img: '../assets/projects/cover_risolvia.webp' },
            { id: 3, title: 'Python Agent', desc: 'Intelligent script orchestrator exploring Python based autonomous agent capabilities.', areas: ['CS Projects', 'Agents/Automation'], techs: ['Python'], featured: false, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/CS_Projects_Py_CPP_Swift_SQL/python/python_agent', img: '../assets/projects/cover_python_agent.webp' },
            { id: 4, title: 'Portfolio Engine', desc: 'SQL infrastructure designed for high-performance portfolio data management and queries.', areas: ['CS Projects'], techs: ['SQL'], featured: false, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/CS_Projects_Py_CPP_Swift_SQL/sql/portfolio_engine', img: '../assets/projects/cover_portfolio_engine.webp' },
            { id: 2, title: 'Financial Tracker', desc: 'Analytical command line utility for tracking currency rates, stock market actions and analyzing financial data.', areas: ['CS Projects'], techs: ['Python'], featured: false, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/CS_Projects_Py_CPP_Swift_SQL/python/financial_tracker', img: '../assets/projects/cover_financial_tracker.webp' },
            { id: 6, title: 'LittleLemonSuite', desc: 'iOS application suite focusing on intuitive interfaces and component reusability.', areas: ['CS Projects'], techs: ['Swift'], featured: false, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/CS_Projects_Py_CPP_Swift_SQL/swift/LittleLemonSuite', img: '../assets/projects/cover_littlelemonsuite.webp' },
            { id: 9, title: 'Estetia Page', desc: 'Modern responsive web application specifically tailored for an aesthetics clinic.', areas: ['Web Application'], techs: ['HTML/JS', 'TypeScript'], featured: false, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/Software_Frontend/estetia_page', img: '../assets/projects/cover_estetia.webp' },
            { id: 10, title: 'Fisia Software', desc: 'Functional software application tailored for physiotherapy clinics and medical data presentation.', areas: ['Web Application'], techs: ['HTML/JS'], featured: false, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/Software_Frontend/fisia_software', img: '../assets/projects/cover_fisia.webp' },
            { id: 12, title: 'n8n Automations', desc: 'Collection of modular JSON workflows integrating complex automated data pipelines.', areas: ['Agents/Automation'], techs: ['n8n'], featured: false, url: 'https://github.com/AgentBooster/portfolio-projects/tree/main/n8n_JSON', img: '../assets/projects/cover_n8n.webp' }
        ];

        const TECH_ICONS = {
            'Python': '../assets/projects/python-fill-svgrepo-com.svg',
            'Swift': '../assets/projects/swift-svgrepo-com (1).svg',
            'C-Family': '../assets/projects/icons8-c++.svg',
            'SQL': '../assets/projects/database-sql-svgrepo-com.svg',
            'TypeScript': '../assets/projects/language-typescript-svgrepo-com.svg',
            'HTML/JS': '../assets/projects/logo-javascript-svgrepo-com.svg',
            'React/Vite': '../assets/projects/logo-react-svgrepo-com.svg',
            'n8n': '../assets/projects/N8n--Streamline-Simple-Icons.svg',
            'TensorFlow': '../assets/projects/tensorflow-svgrepo-com.svg'
        };

        const AREA_ICON = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" class="opacity-70" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>';

        const uniqueAreas = Array.from(new Set(projects.flatMap(p => p.areas)));
        const uniqueTechs = Array.from(new Set(projects.flatMap(p => p.techs)));
        let activeTags = new Set();
        let currentMode = 'ALL'; 

        const grid = document.getElementById('projects-grid');
        const emptyState = document.getElementById('empty-state');
        const areasContainer = document.getElementById('areas-container');
        const techContainer = document.getElementById('tech-container');

        // --- INIT UI ---
        function initTags() {
            uniqueAreas.forEach(area => {
                const btn = document.createElement('button');
                btn.className = `tag-pill flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 bg-white/5 text-[13px] font-medium text-white/70 hover:bg-white/10 hover:text-white`;
                btn.innerHTML = `${AREA_ICON} <span>${area}</span>`;
                btn.onclick = () => toggleTag(area, btn);
                areasContainer.appendChild(btn);
            });

            uniqueTechs.forEach(tech => {
                const btn = document.createElement('button');
                btn.className = `tag-pill flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 bg-white/5 text-[13px] font-medium text-white/70 hover:bg-white/10 hover:text-white`;
                const iconSrc = TECH_ICONS[tech];
                btn.innerHTML = iconSrc 
                    ? `<img src="${iconSrc}" class="w-4 h-4 opacity-70" alt="${tech}"> <span>${tech}</span>` 
                    : `${AREA_ICON} <span>${tech}</span>`;
                btn.onclick = () => toggleTag(tech, btn);
                techContainer.appendChild(btn);
            });
        }

        function toggleTag(tag, element) {
            if (activeTags.has(tag)) {
                activeTags.delete(tag);
                element.classList.remove('active');
            } else {
                activeTags.add(tag);
                element.classList.add('active');
            }
            if (activeTags.size > 0) {
                setFilterMode('TAGS');
            } else {
                setFilterMode('ALL');
            }
            applyFilters();
        }

        // --- RENDER LOGIC ---
        function renderCards(filteredProjects) {
            grid.innerHTML = '';
            
            if (filteredProjects.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            filteredProjects.forEach(proj => {
                const techsHtml = proj.techs.map(t => {
                    const iconSrc = TECH_ICONS[t];
                    const imgTag = iconSrc ? `<img src="${iconSrc}" class="w-3.5 h-3.5 opacity-60 mr-1.5 inline pointer-events-none" alt="">` : '';
                    return `<span class="bg-white/5 border border-white/10 px-2 py-1 flex items-center rounded text-white/60">${imgTag}${t}</span>`;
                }).join('');
                const areasHtml = proj.areas.map(a => `<span class="text-white/30 truncate ml-1 text-xs uppercase tracking-widest">${a}</span>`).join('<span class="text-white/10 mx-1">-</span>');

                const cardHTML = `
                <a href="${proj.url}" target="_blank" rel="noopener noreferrer" class="liquid-glass glass-edge rounded-2xl overflow-hidden flex flex-col group cursor-pointer border border-white/10 transition-all duration-300 hover:-translate-y-1.5 hover:shadow-[0_20px_40px_rgba(0,0,0,0.6)]">
                    <div class="h-48 w-full bg-[#030303] relative overflow-hidden border-b border-white/5">
                        <img loading="lazy" src="${proj.img}" alt="${proj.title}" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700 z-0 text-transparent">
                        <div class="absolute inset-0 bg-gradient-to-t from-black border-transparent to-transparent opacity-80 z-10 pointer-events-none"></div>
                    </div>
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="mb-4">${areasHtml}</div>
                        <h3 class="text-xl font-bold mb-2 text-white group-hover:text-white/90 transition-colors drop-shadow-md">${proj.title}</h3>
                        <p class="text-[15px] text-white/50 mb-8 flex-grow leading-relaxed">${proj.desc}</p>
                        
                        <div class="flex items-end justify-between mt-auto">
                            <div class="flex flex-wrap gap-2 text-[12px] font-semibold text-white/40">
                                ${techsHtml}
                            </div>
                            <div class="w-9 h-9 flex-shrink-0 rounded-full bg-white/10 flex items-center justify-center translate-x-2 opacity-0 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300 border border-white/20">
                                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                            </div>
                        </div>
                    </div>
                </a>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // --- FILTERING ENGINE ---
        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            let filtered = projects;

            if (currentMode === 'FEATURED') {
                filtered = filtered.filter(p => p.featured);
            } else if (currentMode === 'TAGS' || activeTags.size > 0) {
                filtered = filtered.filter(p => {
                    const projectTags = [...p.areas, ...p.techs];
                    // OR logic: shows project if it matches AT LEAST ONE selected tag
                    return Array.from(activeTags).some(t => projectTags.includes(t));
                });
            }

            if (query) {
                filtered = filtered.filter(p => p.title.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query));
            }

            renderCards(filtered);
        }

        function setFilterMode(mode) {
            currentMode = mode;
            ['btn-featured', 'btn-all', 'btn-tags'].forEach(id => {
                document.getElementById(id).classList.remove('active-filter');
                document.getElementById(id).classList.add('text-white/60');
            });
            let btnId = '';
            if (mode === 'FEATURED') btnId = 'btn-featured';
            if (mode === 'ALL') btnId = 'btn-all';
            if (mode === 'TAGS') btnId = 'btn-tags';

            if (btnId) {
                document.getElementById(btnId).classList.add('active-filter');
                document.getElementById(btnId).classList.remove('text-white/60');
            }
        }

        // --- EVENT LISTENERS ---
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        
        document.getElementById('btn-all').addEventListener('click', () => {
            activeTags.clear();
            document.querySelectorAll('.tag-pill').forEach(el => el.classList.remove('active'));
            setFilterMode('ALL');
            applyFilters();
        });

        document.getElementById('btn-featured').addEventListener('click', () => {
            activeTags.clear();
            document.querySelectorAll('.tag-pill').forEach(el => el.classList.remove('active'));
            setFilterMode('FEATURED');
            applyFilters();
        });

        const tagsBtn = document.getElementById('btn-tags');
        const tagsPanel = document.getElementById('tags-panel');
        const tagsIcon = document.getElementById('tags-icon');

        tagsBtn.addEventListener('click', () => {
            const isHidden = tagsPanel.classList.contains('hidden');
            if (isHidden) {
                tagsPanel.classList.remove('hidden');
                tagsIcon.classList.add('rotate-180');
                if (currentMode !== 'TAGS' && activeTags.size > 0) {
                   setFilterMode('TAGS');
                   applyFilters();
                } else if(currentMode === 'ALL' && activeTags.size === 0) {
                   setFilterMode('TAGS');
                   // keep showing all if no tags selected yet
                }
            } else {
                tagsPanel.classList.add('hidden');
                tagsIcon.classList.remove('rotate-180');
            }
        });

        // Bootstrap App
        initTags();
        applyFilters();

    </script>
</body>
</html>
