<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-bg: rgba(255, 255, 255, 0.02);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: white;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        .background-container {
            position: fixed; inset: 0; z-index: -1; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .neon-ring {
            position: absolute; width: 92vw; max-width: 900px; aspect-ratio: 1/1; border-radius: 50%;
            border: 48px solid rgba(255, 255, 255, 0.5); box-shadow: 0 0 100px rgba(255, 255, 255, 0.3), inset 0 0 80px rgba(255, 255, 255, 0.2);
            filter: blur(55px); opacity: 0.85; pointer-events: none; animation: pulse-ring 7s ease-in-out infinite;
        }
        @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 0.9; } }

        .stage-light { position: absolute; bottom: -250px; width: 100%; height: 500px; background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.12) 0%, transparent 70%); filter: blur(120px); pointer-events: none; }

        .liquid-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(55px) saturate(240%); -webkit-backdrop-filter: blur(55px) saturate(240%);
            border: 1px solid rgba(255, 255, 255, 0.18); position: relative; box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6), inset 0 0 14px rgba(255, 255, 255, 0.08);
        }

        .glass-edge::after {
            content: ""; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0) 60%, rgba(255, 255, 255, 0.25) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; pointer-events: none;
        }

        .nav-link { padding: 10px 20px; border-radius: 999px; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); color: rgba(255, 255, 255, 0.5); font-size: 14px; font-weight: 600; }
        @media (min-width: 768px) { .nav-link { padding: 12px 28px; font-size: 15px; } }
        .nav-link:hover { color: white; background: rgba(255, 255, 255, 0.06); }
        .nav-link.active { color: white; background: rgba(255, 255, 255, 0.15); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input:focus { box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1), 0 0 20px rgba(255, 255, 255, 0.1); }
        .active-filter { background: rgba(255, 255, 255, 0.15) !important; color: white !important; }
        .tag-pill { transition: all 0.3s ease; }
        .tag-pill.active { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.5); color: white; }
    </style>
</head>

        const uniqueAreas = Array.from(new Set(projects.flatMap(p => p.areas)));
        const uniqueTechs = Array.from(new Set(projects.flatMap(p => p.techs)));
        let activeTags = new Set();
        let currentMode = 'ALL'; 

        const grid = document.getElementById('projects-grid');
        const emptyState = document.getElementById('empty-state');
        const areasContainer = document.getElementById('areas-container');
        const techContainer = document.getElementById('tech-container');

        // --- INIT UI ---
        function initTags() {
            uniqueAreas.forEach(area => {
                const btn = document.createElement('button');
                btn.className = `tag-pill flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 bg-white/5 text-[13px] font-medium text-white/70 hover:bg-white/10 hover:text-white`;
                btn.innerHTML = `${SVG_ICONS['AreaDefault']} <span>${area}</span>`;
                btn.onclick = () => toggleTag(area, btn);
                areasContainer.appendChild(btn);
            });

            uniqueTechs.forEach(tech => {
                const btn = document.createElement('button');
                btn.className = `tag-pill flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 bg-white/5 text-[13px] font-medium text-white/70 hover:bg-white/10 hover:text-white`;
                const icon = SVG_ICONS[tech] || SVG_ICONS['AreaDefault'];
                btn.innerHTML = `${icon} <span>${tech}</span>`;
                btn.onclick = () => toggleTag(tech, btn);
                techContainer.appendChild(btn);
            });
        }

        function toggleTag(tag, element) {
            if (activeTags.has(tag)) {
                activeTags.delete(tag);
                element.classList.remove('active');
            } else {
                activeTags.add(tag);
                element.classList.add('active');
            }
            if (activeTags.size > 0) {
                setFilterMode('TAGS');
            } else {
                setFilterMode('ALL');
            }
            applyFilters();
        }

        // --- RENDER LOGIC ---
        function renderCards(filteredProjects) {
            grid.innerHTML = '';
            
            if (filteredProjects.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            filteredProjects.forEach(proj => {
                const techsHtml = proj.techs.map(t => `<span class="bg-white/5 border border-white/10 px-2 py-1 rounded text-white/60">${t}</span>`).join('');
                const areasHtml = proj.areas.map(a => `<span class="text-white/30 truncate ml-1 text-xs uppercase tracking-widest">${a}</span>`).join('<span class="text-white/10 mx-1">-</span>');

                const cardHTML = `
                <a href="${proj.url}" target="_blank" rel="noopener noreferrer" class="liquid-glass glass-edge rounded-2xl overflow-hidden flex flex-col group cursor-pointer border border-white/10 transition-all duration-300 hover:-translate-y-1.5 hover:shadow-[0_20px_40px_rgba(0,0,0,0.6)]">
                    <div class="h-48 w-full bg-[#030303] relative overflow-hidden border-b border-white/5">
                        <img src="${proj.img}" alt="${proj.title}" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700 z-0 text-transparent">
                        <div class="absolute inset-0 bg-gradient-to-t from-black border-transparent to-transparent opacity-80 z-10 pointer-events-none"></div>
                    </div>
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="mb-4">${areasHtml}</div>
                        <h3 class="text-xl font-bold mb-2 text-white group-hover:text-white/90 transition-colors drop-shadow-md">${proj.title}</h3>
                        <p class="text-[15px] text-white/50 mb-8 flex-grow leading-relaxed">${proj.desc}</p>
                        
                        <div class="flex items-end justify-between mt-auto">
                            <div class="flex flex-wrap gap-2 text-[12px] font-semibold text-white/40">
                                ${techsHtml}
                            </div>
                            <div class="w-9 h-9 flex-shrink-0 rounded-full bg-white/10 flex items-center justify-center translate-x-2 opacity-0 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300 border border-white/20">
                                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                            </div>
                        </div>
                    </div>
                </a>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // --- FILTERING ENGINE ---
        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            let filtered = projects;

            if (currentMode === 'FEATURED') {
                filtered = filtered.filter(p => p.featured);
            } else if (currentMode === 'TAGS' || activeTags.size > 0) {
                filtered = filtered.filter(p => {
                    const projectTags = [...p.areas, ...p.techs];
                    // OR logic: shows project if it matches AT LEAST ONE selected tag
                    return Array.from(activeTags).some(t => projectTags.includes(t));
                });
            }

            if (query) {
                filtered = filtered.filter(p => p.title.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query));
            }

            renderCards(filtered);
        }

        function setFilterMode(mode) {
            currentMode = mode;
            ['btn-featured', 'btn-all', 'btn-tags'].forEach(id => {
                document.getElementById(id).classList.remove('active-filter');
                document.getElementById(id).classList.add('text-white/60');
            });
            let btnId = '';
            if (mode === 'FEATURED') btnId = 'btn-featured';
            if (mode === 'ALL') btnId = 'btn-all';
            if (mode === 'TAGS') btnId = 'btn-tags';

            if (btnId) {
                document.getElementById(btnId).classList.add('active-filter');
                document.getElementById(btnId).classList.remove('text-white/60');
            }
        }

        // --- EVENT LISTENERS ---
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        
        document.getElementById('btn-all').addEventListener('click', () => {
            activeTags.clear();
            document.querySelectorAll('.tag-pill').forEach(el => el.classList.remove('active'));
            setFilterMode('ALL');
            applyFilters();
        });

        document.getElementById('btn-featured').addEventListener('click', () => {
            activeTags.clear();
            document.querySelectorAll('.tag-pill').forEach(el => el.classList.remove('active'));
            setFilterMode('FEATURED');
            applyFilters();
        });

        const tagsBtn = document.getElementById('btn-tags');
        const tagsPanel = document.getElementById('tags-panel');
        const tagsIcon = document.getElementById('tags-icon');

        tagsBtn.addEventListener('click', () => {
            const isHidden = tagsPanel.classList.contains('hidden');
            if (isHidden) {
                tagsPanel.classList.remove('hidden');
                tagsIcon.classList.add('rotate-180');
                if (currentMode !== 'TAGS' && activeTags.size > 0) {
                   setFilterMode('TAGS');
                   applyFilters();
                } else if(currentMode === 'ALL' && activeTags.size === 0) {
                   setFilterMode('TAGS');
                   // keep showing all if no tags selected yet
                }
            } else {
                tagsPanel.classList.add('hidden');
                tagsIcon.classList.remove('rotate-180');
            }
        });

        // Bootstrap App
        initTags();
        applyFilters();

    </script>
</body>
</html>
