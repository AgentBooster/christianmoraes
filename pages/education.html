<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education - Christian Moraes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-bg: rgba(255, 255, 255, 0.02);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: white;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* FONDO - ESCENA DE ILUMINACIÓN */
        .background-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .neon-ring {
            position: absolute;
            width: 92vw;
            max-width: 900px;
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 48px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 0 100px rgba(255, 255, 255, 0.3), 
                inset 0 0 80px rgba(255, 255, 255, 0.2);
            filter: blur(55px);
            opacity: 0.85;
            pointer-events: none;
            animation: pulse-ring 7s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .stage-light {
            position: absolute;
            bottom: -250px;
            width: 100%;
            height: 500px;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.12) 0%, transparent 70%);
            filter: blur(120px);
            pointer-events: none;
        }

        /* EFECTO LIQUID GLASS */
        .liquid-glass {
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.08),
                rgba(255, 255, 255, 0.02)
            );
            backdrop-filter: blur(55px) saturate(240%);
            -webkit-backdrop-filter: blur(55px) saturate(240%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            position: relative;
            box-shadow: 
                0 24px 50px rgba(0, 0, 0, 0.6),
                inset 0 0 14px rgba(255, 255, 255, 0.08);
        }

        .glass-edge::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(
                145deg, 
                rgba(255, 255, 255, 0.6) 0%, 
                rgba(255, 255, 255, 0) 40%, 
                rgba(255, 255, 255, 0) 60%, 
                rgba(255, 255, 255, 0.25) 100%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
        }

        /* NAVEGACIÓN GLOBAL */
        .nav-link {
            padding: 8px 12px;
            border-radius: 999px;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        @media (min-width: 480px) {
            .nav-link {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        @media (min-width: 768px) {
            .nav-link {
                padding: 12px 28px;
                font-size: 15px;
            }
        }

        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.06);
        }

        .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col items-center">
    
    <!-- Fixed Background -->
    <div class="background-container">
        <div class="neon-ring"></div>
        <div class="stage-light"></div>
    </div>

    <!-- Main Container -->
    <div class="relative z-10 w-full flex flex-col items-center px-4 py-8 md:py-12 min-h-screen">
        
        <!-- Navigation Bar -->
        <nav class="liquid-glass glass-edge px-1.5 py-1.5 md:px-3 md:py-2.5 rounded-full mb-12 flex space-x-0.5 md:space-x-1.5 items-center justify-center max-w-[95vw]">
            <a href="../index.html" class="nav-link">Home</a>
            <a href="projects.html" class="nav-link">Projects</a>
            <a href="education.html" class="nav-link active">Education</a>
            <a href="about.html" class="nav-link">About</a>
        </nav>

        <!-- Main Content (Education) -->
        <main class="w-full max-w-6xl flex flex-col flex-grow items-center justify-center text-center pb-20">
            <h1 class="text-4xl md:text-6xl font-bold tracking-tight mb-6">Education</h1>
            <p class="text-white/50 text-xl">Work in Progress</p>
        </main>
    </div>
</body>
</html>
