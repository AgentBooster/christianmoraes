        :root {

            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;

        }

        /* BACKGROUND - LIGHTING SCENE */
        .background-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .neon-ring {
            position: absolute;
            width: 92vw;
            max-width: 900px;
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 48px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 0 100px rgba(255, 255, 255, 0.3), 
                inset 0 0 80px rgba(255, 255, 255, 0.2);
            filter: blur(55px);
            opacity: 0.85;
            pointer-events: none;
            animation: pulse-ring 7s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .stage-light {
            position: absolute;
            bottom: -250px;
            width: 100%;
            height: 500px;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.12) 0%, transparent 70%);
            filter: blur(120px);
            pointer-events: none;
        }

        /* LIQUID GLASS EFFECT */
        .liquid-glass {
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.08),
                rgba(255, 255, 255, 0.02)
            );
            backdrop-filter: blur(55px) saturate(240%);
            -webkit-backdrop-filter: blur(55px) saturate(240%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            position: relative;
            box-shadow: 
                0 24px 50px rgba(0, 0, 0, 0.6),
                inset 0 0 14px rgba(255, 255, 255, 0.08);
        }

        .glass-edge::after {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(
                145deg, 
                rgba(255, 255, 255, 0.6) 0%, 
                rgba(255, 255, 255, 0) 40%, 
                rgba(255, 255, 255, 0) 60%, 
                rgba(255, 255, 255, 0.25) 100%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
        }

        /* GLOBAL NAVIGATION */
        .nav-link {
            padding: 8px 12px;
            border-radius: 999px;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        @media (min-width: 480px) {
            .nav-link {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        @media (min-width: 768px) {
            .nav-link {
                padding: 12px 28px;
                font-size: 15px;
            }
        }

        .nav-link:hover {
            color: white;

        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

                desc: "Course focused on exercise physiology, covering how the body responds to physical stress, energy metabolism, nutrition, fatigue, performance-enhancing drugs, and the health benefits of exercise.",
                hasCertificate: true, 
                url: "https://www.coursera.org/account/accomplishments/certificate/173C631S8C2R", 
                img: "../assets/education/Science of Exercise.webp" 
            },
            { 
                id: 24, 
                title: "Strengthen Your Business Savvy Specialization", 
                platform: "Coursera", 
                instructor: "Harvard Business Review (HBR)", 
                modality: "Recorded", 
                themes: ["Business", "Leadership"], 
                focus: "Business", 
                status: "Completed", 
                desc: "Specialization focused on core business skills for leaders, covering decision-making, budgeting, strategy, and practical business judgment in modern organizations.",
                hasCertificate: true, 
                url: "https://www.coursera.org/account/accomplishments/specialization/certificate/PDRL0DJN9YE7", 
                img: "../assets/education/Strengthen Your Business Savvy Specialization.webp" 
            }
        ];

        // DOM References
        const grid = document.getElementById('education-grid');
        const emptyState = document.getElementById('empty-state');
        const fTheme = document.getElementById('filter-theme');
        const fModality = document.getElementById('filter-modality');
        const fFocus = document.getElementById('filter-focus');
        const fStatus = document.getElementById('filter-status');
        const fCert = document.getElementById('filter-cert');

        // Extract unique categories for select menus
                function populateSelect(selectEl, key) {
            let uniqueVals;
            if (key === 'themes') {
                const allThemes = education.flatMap(e => e.themes || []).filter(v => v);
                uniqueVals = Array.from(new Set(allThemes)).sort();
            } else {
                uniqueVals = Array.from(new Set(education.map(e => e[key]).filter(v => v))).sort();
            }
            
            uniqueVals.forEach(val => {
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = val;
                opt.className = 'bg-black text-white/80';
                selectEl.appendChild(opt);
            });
        }


        function initData() {
            populateSelect(fTheme, 'themes');
            populateSelect(fModality, 'modality');
            populateSelect(fFocus, 'focus');
            populateSelect(fStatus, 'status');
            runFilters();
        }

        // Filter Engine
        function runFilters() {
            const vTheme = fTheme.value;
            const vModality = fModality.value;
            const vFocus = fFocus.value;
            const vStatus = fStatus.value;
            const needsCert = fCert.checked;

            const filtered = education.filter(e => {
                if (vTheme !== 'ALL' && !e.themes.includes(vTheme)) return false;
                if (vModality !== 'ALL' && e.modality !== vModality) return false;
                if (vFocus !== 'ALL' && e.focus !== vFocus) return false;
                if (vStatus !== 'ALL' && e.status !== vStatus) return false;
                if (needsCert && !e.hasCertificate) return false;
                return true;
            });

            renderCards(filtered);
        }

        // Rendering
        function renderCards(data) {
            grid.innerHTML = '';
            
            if (data.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            data.forEach(item => {
                const hasInstructor = item.instructor && item.instructor.trim() !== "";
                const certHtml = item.hasCertificate 
                    ? `<div class="shrink-0 flex items-center justify-center gap-1.5 px-3 py-1 sm:px-3.5 sm:py-1.5 rounded-full border border-green-500/20 bg-green-500/10 text-green-400 text-[11px] sm:text-[12px] font-semibold tracking-wide transition-colors group-hover:bg-green-500/15">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        Certificate: Yes
                       </div>`
                    : `<div class="shrink-0 flex items-center justify-center gap-1.5 px-3 py-1 sm:px-3.5 sm:py-1.5 rounded-full border border-white/10 bg-white/5 text-white/40 text-[11px] sm:text-[12px] font-semibold tracking-wide">
                        Certificate: No
                       </div>`;

                let btnText = "View Certificate";
                if (!item.hasCertificate && item.url) btnText = "View Program";
                
                const viewCertBtn = item.url 
                    ? `<div class="text-[11px] sm:text-[12px] font-bold text-white/30 group-hover:text-white/90 transition-colors flex items-center gap-1.5 mt-2 md:mt-0">
                        ${btnText}
                        <svg class="w-3.5 h-3.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                       </div>`
                    : `<div class="text-[11px] sm:text-[12px] font-bold text-white/30 group-hover:text-white/90 transition-colors flex items-center gap-1.5 mt-2 md:mt-0 expand-btn">
                        More Details
                        <svg class="w-4 h-4 opacity-70 transition-transform duration-300 expand-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"></path></svg>
                       </div>`;

                const displayTheme = item.themes.join(', ');
                const meta = [item.platform, displayTheme, item.focus, item.status]
                            .filter(Boolean)
                            .join('<span class="text-white/20 mx-1.5">|</span>');
                
                const metaInstructor = hasInstructor 
                    ? `<div class="text-[12px] text-white/50 mb-1">Instructor: <span class="text-white/70">${item.instructor}</span></div>` 
                    : '';

                const WrapperTag = item.url ? 'a' : 'div';
                const anchorAttrs = item.url ? `href="${item.url}" target="_blank" rel="noopener noreferrer"` : `onclick="toggleExpand(this)"`;
                const baseClasses = "liquid-glass glass-edge rounded-3xl p-4 sm:p-5 flex flex-col md:flex-row items-center md:items-stretch gap-4 sm:gap-6 w-full group border border-white/10 transition-all duration-300 bg-white/[0.01]";
                const hoverClasses = "cursor-pointer hover:-translate-y-1 hover:shadow-[0_15px_35px_rgba(0,0,0,0.5)] hover:bg-white/[0.03]";

                const cardHTML = `
                <${WrapperTag} ${anchorAttrs} class="${baseClasses} ${hoverClasses}">
                    
                    <!-- Thumbnail -->
                    <div class="w-full md:w-[12rem] h-[10rem] md:h-[8.5rem] shrink-0 self-center md:self-start rounded-xl bg-black/40 border border-white/5 overflow-hidden flex items-center justify-center relative shadow-inner">
                        <img loading="lazy" src="${item.img}" alt="${item.title}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-300" onerror="this.src=''; this.parentElement.innerHTML='<svg class=\\'w-8 h-8 text-white/20\\' fill=\\'none\\' stroke=\\'currentColor\\' viewBox=\\'0 0 24 24\\'><path stroke-linecap=\\'round\\' stroke-linejoin=\\'round\\' stroke-width=\\'1\\' d=\\'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253\\\'></path></svg>';" />
                    </div>
                    
                    <!-- Info Center -->
                    <div class="flex-grow min-w-0 pr-0 md:pr-4 w-full flex flex-col justify-center">
                        <h3 class="text-base sm:text-lg font-bold text-white/90 group-hover:text-white mb-1.5 leading-snug drop-shadow-md">${item.title}</h3>
                        ${metaInstructor}
                        <div class="text-white/50 text-[12px] sm:text-[13px] tracking-wide font-medium flex flex-wrap gap-y-1 mb-2">
                            ${meta}
                        </div>
                        <p class="desc-text text-white/30 text-[12px] line-clamp-3 leading-relaxed mt-1 transition-all duration-300">${item.desc}</p>
                    </div>

                    <!-- Actions Right -->
                    <div class="shrink-0 flex flex-row md:flex-col items-center md:items-end justify-between md:self-stretch w-full md:w-auto mt-2 md:mt-0 py-1">
                        ${certHtml}
                        ${viewCertBtn}
                    </div>
                </${WrapperTag}>

                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Initialize Call
        document.addEventListener('DOMContentLoaded', initData);

        // Card Accordion Logic
        window.toggleExpand = function(el) {
            const desc = el.querySelector('.desc-text');
            const icon = el.querySelector('.expand-icon');
            if (desc) {
                if (desc.classList.contains('line-clamp-3')) {
                    desc.classList.remove('line-clamp-3');
                    if (icon) icon.style.transform = 'rotate(180deg)';
                    el.classList.remove('hover:-translate-y-1');
                } else {
                    desc.classList.add('line-clamp-3');
                    if (icon) icon.style.transform = 'rotate(0deg)';
                    el.classList.add('hover:-translate-y-1');
                }
            }
        };

    </script>
    </div>
</body>
</html>
